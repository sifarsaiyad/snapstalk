<!DOCTYPE html>
<html lang="en">

<!-- Mirrored from isocial.live/snapchat/ by HTTrack Website Copier/3.x [XR&CO'2014], Fri, 12 Jun 2026 08:43:01 GMT -->
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iSOCIAL</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <button class="menu-btn">☰</button>
            <button class="sun-btn">☀️</button>
        </div>

        <!-- Logo Section -->
        <div class="logo-section">
            <img src="avatars.png" alt="User Avatars" class="avatar-logo">
        </div>

        <!-- Search Input -->
        <div class="search-container">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input type="text" placeholder="Enter Username..." class="search-input">
            </div>
        </div>

        <!-- Connect Button -->
        <div class="button-container">
            <button id="connectBtn" class="connect-btn">CONNECT</button>
        </div>

        <!-- Features List -->
        <div class="features-list">
            <!-- Custom App Icon -->
            <button class="feature-card" data-feature="💖Best Friend List">
                <div class="icon-container">💖</div>
                <div class="feature-content">
                    <h3 class="feature-title">Best Friend List</h3>
                    <p class="feature-description">Reveal 8 Best friends of any user!</p>
                </div>
                <span class="arrow">›</span>
            </button>

              <!-- Chat Wallpapers -->
            <button class="feature-card" data-feature="📸View Camera">
                <div class="icon-container">📸</div>
                <div class="feature-content">
                    <h3 class="feature-title">View Camera</h3>
                    <p class="feature-description">View Camera on any Snapchat user .</p>
                </div>
                <span class="arrow">›</span>
            </button>

            <!-- Chat Wallpapers -->
            <button class="feature-card" data-feature="🧐️Snapping With Mod">
                <div class="icon-container">🧐️</div>
                <div class="feature-content">
                    <h3 class="feature-title">Snapping With Mod</h3>
                    <p class="feature-description">Find out who they're snapping with.</p>
                </div>
                <span class="arrow">›</span>
            </button>

            <!-- Custom App Themes -->
            <button class="feature-card" data-feature="💬 Live chat">
                <div class="icon-container">💬</div>
                <div class="feature-content">
                    <h3 class="feature-title">Live Chat</h3>
                    <p class="feature-description">See then writing Live.</p>
                </div>
                <span class="arrow">›</span>
            </button>

            <!-- #1 Best Friend -->
            <button class="feature-card" data-feature="🖼️My Eyes Only">
                <div class="icon-container">🖼️</div>
                <div class="feature-content">
                    <h3 class="feature-title">My Eyes Only</h3>
                    <p class="feature-description">Request My Eyes Only memories.</p>
                </div>
                <span class="arrow">›</span>
            </button>

            <!-- Story Rewatch -->
            <button class="feature-card" data-feature="💬Chat History">
                <div class="icon-container">💬</div>
                <div class="feature-content">
                    <h3 class="feature-title">Chat History</h3>
                    <p class="feature-description">Request Chat History, Talk History.</p>
                </div>
                <span class="arrow">›</span>
            </button>
        </div>

        <!-- Loading Progress Modal -->
        <div id="progressModal" class="progress-modal hidden">
            <div class="progress-container">
                <h2 class="progress-feature-title" id="progressTitle">Custom App Icon</h2>
                
                <div class="progress-bar-wrapper">
                    <div id="progressBar" class="progress-bar"></div>
                </div>

                <div class="progress-info">
                    <span id="progressPercent" class="progress-percent">0%</span>
                    <span class="progress-status">Loading...</span>
                </div>

                <p class="progress-processing-text">Processing request for <span id="userInput">user</span></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

<!-- Mirrored from isocial.live/snapchat/ by HTTrack Website Copier/3.x [XR&CO'2014], Fri, 12 Jun 2026 08:43:02 GMT -->
</html>
